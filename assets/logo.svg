<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" role="img" aria-label="Proxy Scraper — scrape and validate free proxies">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="716" height="196" rx="24" fill="url(#bg)"/>

  <!-- relay motif: client -> proxy -> server -->
  <g transform="translate(70,100)" fill="none" stroke-width="6" stroke-linecap="round">
    <line x1="0" y1="0" x2="58" y2="0" stroke="#475569"/>
    <line x1="58" y1="0" x2="116" y2="0" stroke="url(#accent)"/>
    <circle cx="0" cy="0" r="14" fill="#0f172a" stroke="#64748b"/>
    <circle cx="58" cy="0" r="20" fill="#0f172a" stroke="url(#accent)" stroke-width="7"/>
    <circle cx="116" cy="0" r="14" fill="#0f172a" stroke="#64748b"/>
    <circle cx="58" cy="0" r="7" fill="url(#accent)" stroke="none"/>
  </g>

  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="240" y="92" font-size="52" font-weight="700" fill="#f8fafc">Proxy Scraper</text>
    <text x="242" y="132" font-size="23" font-weight="500" fill="#94a3b8" letter-spacing="2">
      scrape <tspan fill="#34d399">·</tspan> validate <tspan fill="#34d399">·</tspan> free proxies
    </text>
  </g>
</svg>
